name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pfe_user
          POSTGRES_PASSWORD: pfe_password
          POSTGRES_DB: pfe_ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pfe_user -d pfe_ecommerce_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier la syntaxe de tout le code
        run: python -m compileall -q app

      - name: Lancer la suite de tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://pfe_user:pfe_password@localhost:5432/pfe_ecommerce_test
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker du backend
        run: docker build -t pfe-ecommerce-backend:ci ./backend
